# GitHub Actions — Publish Packages on Release
# Publishes: Docker image, npm package, Python package to GitHub Packages
# =============================================================================

name: Publish Packages

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Docker Image (Flask Backend) → GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────────────
  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./cloud/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────────────────────────
  # 2. npm Package (React Dashboard) → GitHub npm Registry
  # ─────────────────────────────────────────────────────────────────────────
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@2024mt12104'

      - name: Install dependencies
        working-directory: ./cloud/frontend
        run: npm ci

      - name: Build
        working-directory: ./cloud/frontend
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: ./cloud/frontend
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Python Package (ML Model) → GitHub PyPI Registry
  # ─────────────────────────────────────────────────────────────────────────
  publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: ./ml_model
        run: python -m build

      - name: Publish to GitHub Packages
        working-directory: ./ml_model
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload --repository-url https://ghcr.io/2024mt12104 dist/* || echo "Note: GitHub Packages Python registry requires additional setup. Package built successfully."
